<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITINIX - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.55)),
url("images/bromo.jpg") center/cover no-repeat;
padding:20px;
}

.container{
width:100%;
max-width:430px;
background:rgba(255,255,255,.96);
padding:38px;
border-radius:24px;
box-shadow:0 20px 45px rgba(0,0,0,.18);
animation:fadeUp .8s ease;
}

.back{
display:inline-block;
margin-bottom:18px;
font-size:15px;
color:#555;
text-decoration:none;
}

.back i{
margin-right:8px;
}

.logo{
text-align:center;
font-size:42px;
font-weight:900;
color:#2b73ff;
letter-spacing:2px;
margin-bottom:8px;
}

.sub{
text-align:center;
font-size:16px;
color:#666;
margin-bottom:28px;
}

.group{
margin-bottom:18px;
}

.group label{
display:block;
font-size:14px;
font-weight:700;
margin-bottom:8px;
color:#333;
}

.input-box{
position:relative;
}

.input-box input{
width:100%;
padding:14px 16px;
padding-left:45px;
padding-right:45px;
border:1px solid #ddd;
border-radius:14px;
font-size:16px;
outline:none;
transition:.2s;
}

.input-box input:focus{
border-color:#2b73ff;
box-shadow:0 0 0 4px rgba(43,115,255,.12);
}

.left-icon{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
color:#666;
font-size:16px;
}

.right-icon{
position:absolute;
right:16px;
top:50%;
transform:translateY(-50%);
color:#666;
font-size:16px;
cursor:pointer;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#2b73ff;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.2s;
margin-top:10px;
}

button:hover{
background:#1e5fe2;
transform:translateY(-2px);
}

.bottom{
text-align:center;
margin-top:18px;
font-size:15px;
color:#555;
}

.bottom a{
color:#2b73ff;
font-weight:700;
text-decoration:none;
}

.helper{
text-align:right;
margin-top:-8px;
margin-bottom:15px;
}

.helper a{
font-size:14px;
text-decoration:none;
color:#2b73ff;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:500px){
.container{
padding:28px 22px;
}
.logo{
font-size:34px;
}
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">
<i class="fa-solid fa-arrow-left"></i>Kembali
</a>

<div class="logo">ITINIX</div>
<div class="sub">Masuk untuk melanjutkan perjalananmu</div>

<form id="loginForm">

<div class="group">
<label>Email</label>
<div class="input-box">
<i class="fa-solid fa-envelope left-icon"></i>
<input type="email" id="email" required placeholder="Masukkan email">
</div>
</div>

<div class="group">
<label>Password</label>
<div class="input-box">
<i class="fa-solid fa-lock left-icon"></i>
<input type="password" id="password" required placeholder="Masukkan password">
<i class="fa-solid fa-eye right-icon" id="eyeBtn" onclick="togglePass()"></i>
</div>
</div>

<div class="helper">
<a href="#" onclick="lupaPassword()">Lupa password?</a>
</div>

<button type="submit">Login</button>

</form>

<div class="bottom">
Belum punya akun?
<a href="signup.html">Sign Up</a>
</div>

</div>

<script>
if(localStorage.getItem("isLogin") === "true"){
window.location.href = "dashboard.html";
}

function togglePass(){

const input = document.getElementById("password");
const icon = document.getElementById("eyeBtn");

if(input.type === "password"){
input.type = "text";
icon.classList.remove("fa-eye");
icon.classList.add("fa-eye-slash");
}else{
input.type = "password";
icon.classList.remove("fa-eye-slash");
icon.classList.add("fa-eye");
}

}

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value;

let users = JSON.parse(localStorage.getItem("users")) || [];

let user = users.find(data =>
data.email === email &&
data.password === password
);

if(user){

localStorage.setItem("isLogin","true");
localStorage.setItem("userLogin", JSON.stringify(user));

alert("Login berhasil!");

window.location.href = "dashboard.html";

}else{

alert("Email atau password salah!");

}

});

function lupaPassword(){

let email = document.getElementById("email").value.trim();

if(email === ""){
alert("Masukkan email terlebih dahulu.");
return;
}

let users = JSON.parse(localStorage.getItem("users")) || [];

let user = users.find(data => data.email === email);

if(user){
alert("Password akun kamu: " + user.password);
}else{
alert("Email tidak ditemukan.");
}

}
</script>

</body>
</html>
