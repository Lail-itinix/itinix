<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITINIX - Welcome</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body,html{
width:100%;
height:100%;
overflow:hidden;
}

/* ================= BACKGROUND ================= */
.hero{
width:100%;
height:100vh;
background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.55)),
url("images/bromo.jpg") center/cover no-repeat;
position:relative;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

/* ================= CONTENT ================= */
.content{
padding:20px;
animation:fadeUp 1s ease;
}

.content h1{
font-size:92px;
font-weight:900;
letter-spacing:4px;
margin-bottom:18px;
text-shadow:0 8px 25px rgba(0,0,0,.4);
}

.content p{
font-size:30px;
margin-bottom:40px;
text-shadow:0 4px 10px rgba(0,0,0,.4);
}

/* ================= BUTTON ================= */
.btn-wrap{
display:flex;
gap:18px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
min-width:180px;
padding:16px 28px;
border-radius:14px;
font-size:22px;
font-weight:700;
cursor:pointer;
transition:.25s;
text-decoration:none;
display:inline-flex;
justify-content:center;
align-items:center;
}

.btn-outline{
border:2px solid white;
color:white;
background:transparent;
}

.btn-outline:hover{
background:white;
color:#111;
transform:translateY(-3px);
}

.btn-main{
background:#f8aa00;
color:white;
border:none;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.btn-main:hover{
background:#df9700;
transform:translateY(-3px);
}

/* ================= FOOTER ================= */
.footer{
position:absolute;
bottom:0;
left:0;
width:100%;
background:rgba(0,0,0,.55);
padding:18px;
text-align:center;
font-size:20px;
line-height:1.8;
backdrop-filter:blur(4px);
}

.footer i{
margin-right:8px;
width:24px;
}

/* ================= ANIMATION ================= */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ================= MOBILE ================= */
@media(max-width:768px){

.content h1{
font-size:56px;
}

.content p{
font-size:20px;
line-height:1.5;
margin-bottom:28px;
}

.btn{
min-width:145px;
font-size:18px;
padding:14px 22px;
}

.footer{
font-size:15px;
padding:14px;
}

}
</style>
</head>
<body>

<section class="hero">

<div class="content">

<h1>ITINIX</h1>

<p>Rencanakan liburanmu dengan mudah dan efisien</p>

<div class="btn-wrap">

<a href="signup.html" class="btn btn-outline">
Sign Up
</a>

<a href="login.html" class="btn btn-main">
Login
</a>

</div>

</div>

<div class="footer">

<div><i class="fa-solid fa-location-dot"></i>Jalan Semarang No. 5, Kota Malang</div>
<div><i class="fa-solid fa-phone"></i>+62 895-6368-78367</div>
<div><i class="fa-solid fa-envelope"></i>itinix@gmail.com</div>
<div><i class="fa-brands fa-instagram"></i>@Itinix.journey</div>

</div>

</section>

</body>
</html>
