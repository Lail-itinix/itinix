<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lokasi Saya</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

.info{
position:absolute;
top:20px;
left:20px;
z-index:999;
background:white;
padding:20px;
border-radius:16px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h2{
margin:0 0 10px;
}

.back{
position:absolute;
top:20px;
right:20px;
z-index:999;
background:#0d6efd;
color:white;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>
<body>

<div class="info">
<h2>Lokasi Anda</h2>
<div id="alamat">Memuat alamat...</div>
<br>
<b id="koordinat"></b>
</div>

<div class="back" onclick="window.location.href='dashboard.html'">
← Kembali
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-7.98,112.63],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

navigator.geolocation.getCurrentPosition(async pos=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

map.setView([lat,lon],17);

L.marker([lat,lon]).addTo(map)
.bindPopup("Lokasi Anda")
.openPopup();

document.getElementById("koordinat").innerHTML=
lat.toFixed(5)+", "+lon.toFixed(5);

/* reverse geocode */
let url=`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;

let res = await fetch(url);
let data = await res.json();

document.getElementById("alamat").innerHTML =
data.display_name;

});

</script>
</body>
</html>
